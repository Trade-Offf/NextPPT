packages:
  - 'apps/*'
  - 'packages/*'

onlyBuiltDependencies:
  - esbuild
  - puppeteer

# pnpm v11 deprecated onlyBuiltDependencies and blocks dependency build scripts by
# default (ERR_PNPM_IGNORED_BUILDS). puppeteer's postinstall MUST run to download
# Chromium, so allow build scripts. Safe here: own app with a committed lockfile.
dangerouslyAllowAllBuilds: true

# Disable pnpm's default 24h new-package cooldown (default minimumReleaseAge=1440),
# which otherwise blocks our committed lockfile's recently published deps in clean
# Docker/CI builds with ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION.
minimumReleaseAge: 0
